name: Release

# Manual "publish" button. Derives the SemVer with GitVersion, tags it, and warms the public Go module
# proxy so pkg.go.dev indexes the release. Go modules are not pushed to a registry — publishing is the
# tag, and proxy.golang.org fetches on first request; the warm step just triggers that immediately.
#
# Requires the repository to be PUBLIC for the proxy to serve the module. Releasing deliberately
# (workflow_dispatch) rather than on every push avoids version churn.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute the version and run tests, but do not tag or publish"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Guard - releases run from main
        if: ${{ !inputs.dry_run && github.ref_name != 'main' }}
        run: |
          echo "::error::Releases must be run from 'main' (got '${{ github.ref_name }}'). Merge develop -> main first."
          exit 1
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race -count=1 ./...

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'
      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
      - name: Report version
        run: echo "Release version -> v${{ steps.gitversion.outputs.majorMinorPatch }} (dry_run=${{ inputs.dry_run }})"

      - name: Tag and publish
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: v${{ steps.gitversion.outputs.majorMinorPatch }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists; nothing to publish." && exit 0
          fi
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "$VERSION"
          # Trigger public proxy indexing.
          GOPROXY=proxy.golang.org go list -m "github.com/phillipjad/go-rsos@$VERSION" || true

      - name: GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.majorMinorPatch }}
          generate_release_notes: true
